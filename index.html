		 <figure> <img src="photo.jpg" height="250" align="right"/> 
		<p> I am currently a student in the École Normale Supérieure in Paris. In September 2018, I will start a PhD at <a href="http://www.u-psud.fr/fr/index.html" target="_blank"> Université Paris-Sud </a> and <a href="http://www.inria.fr/centre/saclay" target="_blank"> Inria Saclay </a> <br> in the <a href="https://www.inria.fr/en/teams/datashape" target="_blank">DataShape</a> team. Under the supervision of <a href="http://massart.pascal.free.fr/Site/Home.html" target="_blank"> Pascal Massart </a> and <a href="http://geometrica.saclay.inria.fr/team/Fred.Chazal/" target="_blank"> Frédéric Chazal</a>, I will examine how model selection techniques can be applied to topological data analysis.</a></p>
